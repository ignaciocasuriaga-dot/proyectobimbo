íder 6 un","brand":"Precio Líder","supermarket":"Disco","publishedPrice":41,"regularPrice":null,"offerPrice":null,"discount":null,"pvpSugerido":null,"gapPercent":null,"url":"https://www.disco.com.uy/pan-de-viena-precio-líder-6-un/p","imageUrl":"","scrapedAt":"2026-05-29T00:18:51.446Z"},{"id":"tata-pan-de-viena-ta-ta-6-un","name":"Pan de Viena Ta-Ta 6 un","brand":"Ta-Ta","supermarket":"Tata","publishedPrice":44,"regularPrice":null,"offerPrice":null,"discount":null,"pvpSugerido":null,"gapPercent":null,"url":"https://www.tata.com.uy/pan-de-viena-ta-ta-6-un/p","imageUrl":"","scrapedAt":"2026-05-29T00:18:51.446Z"}];
const SUPERS=['Tata','Disco','Tienda Inglesa','El Dorado'];
const BIMBO=new Set(['Bimbo','Artesano','Bimbo Vital','Los Sorchantes']);
const CATS=['Pan de Molde','Pan de Tortuga','Pan de Viena'];
const SC={'Tata':'bg-orange-100 text-orange-800 border-orange-200','Disco':'bg-purple-100 text-purple-800 border-purple-200','Tienda Inglesa':'bg-red-100 text-red-800 border-red-200','El Dorado':'bg-yellow-100 text-yellow-800 border-yellow-200'};
let activeCat='Pan de Molde';

function detCat(name,brand){
  const n=(name+' '+(brand||'')).toLowerCase();
  if(n.includes('tortuga')||n.includes('hamburguesa')||n.includes('hot dog')||n.includes('hotdog')||n.includes('perrito'))return'Pan de Tortuga';
  if(n.includes('viena')||n.includes('vienes')||n.includes('vienés')||n.includes('frances')||n.includes('francés')||n.includes('baguette')||n.includes('sorchante')||n.includes('cubano')||n.includes('pan franc'))return'Pan de Viena';
  if(n.includes('glu free')||n.includes('gluten free'))return'Pan de Tortuga';
  if(n.includes('pagnifique'))return'Pan de Tortuga';
  if(n.includes('lactal')||n.includes('molde')||n.includes('sandwich')||n.includes('integral')||n.includes('blanco')||n.includes('artesano')||n.includes('brioche')||n.includes('bauducco')||n.includes('visconti')||n.includes('marbella')||n.includes('campestre')||n.includes('fantastico')||n.includes('fantástico')||n.includes('vital')||n.includes('sin gluten')||n.includes('sanosinharina'))return'Pan de Molde';
  if(brand==='Bimbo'||brand==='Artesano'||brand==='Bimbo Vital'||brand==='Bauducco'||brand==='Visconti'||brand==='Marbella'||brand==='Campestre'||brand==='Fantastico'||brand==='Glu'||brand==='Sanosinharina')return'Pan de Molde';
  if(brand==='Los Sorchantes')return'Pan de Viena';
  if(brand==='Glu Free'||brand==='Pagnifique')return'Pan de Tortuga';
  if(brand==='Precio Líder'||brand==="Ta-Ta"||brand==='Tienda Inglesa')return'Pan de Molde';
  return'Otro';
}

function fmt(n){return n!=null?'$'+Math.round(n).toLocaleString('es-UY'):'—';}
function stag(s){const c=SC[s]||'bg-gray-100 text-gray-800 border-gray-200';return'<span class="text-xs px-2.5 py-1 rounded-full font-bold border '+c+'">'+s+'</span>';}
function sbadge(s){const c=SC[s]||'bg-gray-100 text-gray-700 border-gray-200';return'<span class="text-xs px-2 py-0.5 rounded-full font-medium border '+c+'">'+s+'</span>';}

function init(){
  document.getElementById('st-total').textContent=PRODUCTS.length;
  document.getElementById('st-brands').textContent=new Set(PRODUCTS.map(p=>p.brand)).size;
  document.getElementById('st-supers').textContent=new Set(PRODUCTS.map(p=>p.supermarket)).size+'/4';
  const of=PRODUCTS.filter(p=>p.offerPrice);
  document.getElementById('st-offers').textContent=of.length;
  document.getElementById('bdg-ofertas').textContent=of.length||'';
  if(PRODUCTS.length){const d=new Date(PRODUCTS[0].scrapedAt);document.getElementById('lastUp').textContent=d.toLocaleString('es-UY',{dateStyle:'medium',timeStyle:'short'});}
  renderBimbo();renderCatalogo();renderOfertas();
}

function setTab(t){
  ['bimbo','catalogo','ofertas'].forEach(id=>{
    const btn=document.getElementById('tb-'+id),cont=document.getElementById('ct-'+id);
    if(id===t){btn.classList.add('border-red-600','text-red-600');btn.classList.remove('border-transparent','text-gray-500');cont.style.display='';}
    else{btn.classList.remove('border-red-600','text-red-600');btn.classList.add('border-transparent','text-gray-500');cont.style.display='none';}
  });
}

function setCat(cat){
  activeCat=cat;
  CATS.forEach(c=>{
    const b=document.getElementById('cb-'+c.replace(/ /g,'_'));
    if(!b)return;
    b.className=(c===cat?'tab-act':'tab-in')+' px-4 py-2 rounded-lg text-sm font-semibold border transition-all';
    const sp=b.querySelector('span');if(sp)sp.className='ml-1.5 text-xs px-1.5 py-0.5 rounded-full '+(c===cat?'bg-red-500 text-white':'bg-gray-100 text-gray-500');
  });
  renderBimbo();
}

function renderBimbo(){
  const cat=activeCat;
  const cp=PRODUCTS.filter(p=>detCat(p.name,p.brand)===cat);
  const cc=Object.fromEntries(CATS.map(c=>[c,PRODUCTS.filter(p=>detCat(p.name,p.brand)===c).length]));

  const sa=SUPERS.map(sup=>{
    const sp=cp.filter(p=>p.supermarket===sup);
    const bm={};for(const p of sp){if(!bm[p.brand]||p.publishedPrice<bm[p.brand].publishedPrice)bm[p.brand]=p;}
    const ranked=Object.entries(bm).sort(([,a],[,b])=>a.publishedPrice-b.publishedPrice).map(([brand,product],i)=>({brand,product,rank:i+1,isBimbo:BIMBO.has(brand)}));
    const be=ranked.filter(r=>r.isBimbo);
    const br=be.length>0?Math.min(...be.map(r=>r.rank)):null;
    return{sup,ranked,total:ranked.length,present:be.length>0,br};
  });

  const bp=cp.filter(p=>BIMBO.has(p.brand)),xp=cp.filter(p=>!BIMBO.has(p.brand));
  const sp2=sa.filter(s=>s.present).length,sf=sa.filter(s=>s.br===1).length;
  const ba=bp.length?Math.round(bp.reduce((s,p)=>s+p.publishedPrice,0)/bp.length):null;
  const ca2=xp.length?Math.round(xp.reduce((s,p)=>s+p.publishedPrice,0)/xp.length):null;
  const pd=ba&&ca2?Math.round(((ba-ca2)/ca2)*100):null;
  const bo=bp.filter(p=>p.offerPrice).length,co=xp.filter(p=>p.offerPrice).length;

  let h='<div class="flex gap-2 flex-wrap mb-4">';
  for(const c of CATS){
    h+='<button id="cb-'+c.replace(/ /g,'_')+'" onclick="setCat(''+c+'')" class="'+(c===cat?'tab-act':'tab-in')+' px-4 py-2 rounded-lg text-sm font-semibold border transition-all">'+c+'<span class="ml-1.5 text-xs px-1.5 py-0.5 rounded-full '+(c===cat?'bg-red-500 text-white':'bg-gray-100 text-gray-500')+'">'+cc[c]+'</span></button>';
  }
  h+='</div>';

  if(!cp.length){h+='<div class="bg-white rounded-xl border border-gray-200 p-10 text-center text-sm text-gray-400">Sin productos de <strong>'+cat+'</strong>.</div>';document.getElementById('ct-bimbo').innerHTML=h;return;}

  // Summary bar
  h+='<div class="bg-white rounded-xl border border-gray-200 px-5 py-3 flex flex-wrap gap-x-6 gap-y-1 text-sm items-center mb-4">';
  h+='<span class="text-gray-500">Presente en <strong class="text-blue-600">'+sp2+'/4</strong> supers</span><span class="text-gray-300">·</span>';
  h+='<span class="text-gray-500">Más barato en <strong class="'+(sf>0?'text-green-600':'text-gray-400')+'">'+sf+'/4</strong></span>';
  if(pd!==null){const dc=pd>5?'text-orange-600':pd<-5?'text-green-600':'text-gray-700';h+='<span class="text-gray-300">·</span><span class="text-gray-500">vs competencia: <strong class="'+dc+'">'+(pd>0?'+':'')+pd+'%</strong></span>';}
  if(bo+co>0){h+='<span class="text-gray-300">·</span><span class="text-gray-500"><strong class="text-orange-500">'+(bo+co)+'</strong> ofertas (Bimbo: '+bo+' · comp: '+co+')</span>';}
  h+='</div>';

  // 2x2 panels
  h+='<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
  for(const s of sa){
    h+='<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">';
    h+='<div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">'+stag(s.sup);
    if(!s.present)h+='<span class="text-xs text-gray-400 italic">Bimbo ausente</span>';
    else{const rc=s.br===1?'bg-green-100 text-green-700':s.br<=3?'bg-yellow-100 text-yellow-700':'bg-red-50 text-red-500';h+='<span class="text-xs font-bold px-2 py-0.5 rounded-full '+rc+'">Bimbo #'+s.br+' de '+s.total+'</span>';}
    h+='</div><div class="divide-y divide-gray-50">';
    if(!s.ranked.length){h+='<div class="px-4 py-6 text-center text-xs text-gray-300">Sin productos</div>';}
    else for(const {brand,product,rank,isBimbo} of s.ranked){
      const rc=rank===1?'bg-green-100 text-green-700':rank===s.ranked.length&&s.ranked.length>2?'bg-red-50 text-red-400':'bg-gray-100 text-gray-500';
      h+='<div class="px-4 py-2.5 flex items-center gap-3 '+(isBimbo?'bg-red-50/30':'')+'">';
      h+='<span class="w-5 h-5 text-xs font-bold rounded-full flex items-center justify-center flex-shrink-0 '+rc+'">'+rank+'</span>';
      h+='<div class="flex-1 min-w-0"><div class="flex items-center gap-1.5"><span class="text-sm font-semibold '+(isBimbo?'text-red-700':'text-gray-700')+'">'+brand+'</span>';
      if(isBimbo)h+='<span class="text-xs bg-red-100 text-red-600 px-1 py-0.5 rounded font-bold">B</span>';
      h+='</div><a href="'+(product.url||'#')+'" target="_blank" class="text-xs text-gray-400 truncate block hover:text-blue-500" title="'+product.name+'">'+product.name+'</a></div>';
      h+='<div class="text-right flex-shrink-0"><div class="text-sm font-bold '+(isBimbo?'text-red-800':'text-gray-800')+'">'+fmt(product.publishedPrice)+'</div>';
      if(product.offerPrice)h+='<span class="text-xs bg-orange-100 text-orange-600 px-1 rounded font-semibold">-'+product.discount+'%</span>';
      h+='</div></div>';
    }
    h+='</div></div>';
  }
  h+='</div>';
  document.getElementById('ct-bimbo').innerHTML=h;
}

function renderCatalogo(){
  let h='<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">';
  h+='<div class="p-4 border-b border-gray-100"><input type="text" id="cSearch" oninput="filterCat()" placeholder="🔍 Buscar..." class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm w-full focus:outline-none focus:ring-2 focus:ring-blue-500"></div>';
  h+='<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50 border-b border-gray-100"><tr>';
  for(const c of ['Producto','Marca','Supermercado','Precio','Dto.']){
    h+='<th class="px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase '+(['Precio','Dto.'].includes(c)?'text-right':'text-left')+'">'+c+'</th>';
  }
  h+='</tr></thead><tbody class="divide-y divide-gray-50">';
  for(const p of [...PRODUCTS].sort((a,b)=>a.brand.localeCompare(b.brand,'es')||a.name.localeCompare(b.name,'es'))){
    const ib=BIMBO.has(p.brand);
    h+='<tr class="crow hover:bg-blue-50/20 '+(ib?'bg-red-50/20':'')+'" data-s="'+(p.name+' '+p.brand+' '+p.supermarket).toLowerCase()+'">';
    h+='<td class="px-3 py-2.5 max-w-52"><a href="'+(p.url||'#')+'" target="_blank" class="text-xs font-medium text-gray-800 hover:text-blue-600">'+p.name+'</a></td>';
    h+='<td class="px-3 py-2.5"><span class="text-xs px-2 py-0.5 rounded-full font-semibold '+(ib?'bg-red-100 text-red-700':'bg-gray-100 text-gray-600')+'">'+p.brand+'</span></td>';
    h+='<td class="px-3 py-2.5">'+sbadge(p.supermarket)+'</td>';
    h+='<td class="px-3 py-2.5 text-right font-semibold text-gray-900">'+fmt(p.publishedPrice)+'</td>';
    h+='<td class="px-3 py-2.5 text-right">'+(p.discount?'<span class="bg-green-100 text-green-700 text-xs px-1.5 py-0.5 rounded font-bold">-'+p.discount+'%</span>':'<span class="text-gray-200">—</span>')+'</td>';
    h+='</tr>';
  }
  h+='</tbody></table></div></div>';
  document.getElementById('ct-catalogo').innerHTML=h;
}

function filterCat(){
  const q=document.getElementById('cSearch').value.toLowerCase();
  document.querySelectorAll('.crow').forEach(r=>{r.style.display=r.dataset.s.includes(q)?'':'none';});
}

function renderOfertas(){
  const of=PRODUCTS.filter(p=>p.offerPrice&&p.discount).sort((a,b)=>(b.discount||0)-(a.discount||0));
  if(!of.length){document.getElementById('ct-ofertas').innerHTML='<div class="text-center py-16 text-gray-400 text-sm">No hay ofertas activas.</div>';return;}
  let h='<div class="bg-white rounded-xl border border-gray-200 overflow-hidden"><table class="w-full text-sm"><thead class="bg-gray-50 border-b border-gray-100"><tr>';
  for(const c of ['Producto','Marca','Supermercado','Lista','Oferta','Ahorro']){
    h+='<th class="px-3 py-2.5 text-xs font-semibold text-gray-500 uppercase '+(['Lista','Oferta','Ahorro'].includes(c)?'text-right':'text-left')+'">'+c+'</th>';
  }
  h+='</tr></thead><tbody class="divide-y divide-gray-50">';
  for(const p of of){
    const ib=BIMBO.has(p.brand);
    h+='<tr class="hover:bg-green-50/20">';
    h+='<td class="px-3 py-2.5 max-w-48"><a href="'+(p.url||'#')+'" target="_blank" class="text-xs font-medium text-gray-800 hover:text-blue-600">'+p.name+'</a></td>';
    h+='<td class="px-3 py-2.5"><span class="text-xs px-2 py-0.5 rounded-full font-semibold '+(ib?'bg-red-100 text-red-700':'bg-gray-100 text-gray-600')+'">'+p.brand+'</span></td>';
    h+='<td class="px-3 py-2.5">'+sbadge(p.supermarket)+'</td>';
    h+='<td class="px-3 py-2.5 text-right text-gray-400 line-through text-xs">'+fmt(p.regularPrice)+'</td>';
    h+='<td class="px-3 py-2.5 text-right text-green-700 font-semibold">'+fmt(p.publishedPrice)+'</td>';
    h+='<td class="px-3 py-2.5 text-right"><span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded font-bold">-'+p.discount+'%</span></td>';
    h+='</tr>';
  }
  h+='</tbody></table></div>';
  document.getElementById('ct-ofertas').innerHTML=h;
}

window.onload=init;
</script>
